# prevent race confition on iptables updates
# https://engineering.rakuten.today/post/graceful-k8s-delpoyments/
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 10"]
terminationGracePeriodSeconds: 30

