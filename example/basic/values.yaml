replicaCount: 2
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
pdb:
  enabled: true
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - '{{ include "stardust.name" $ }}'
          - key: app.kubernetes.io/instance
            operator: In
            values:
              - "{{ .Release.Name }}"
        topologyKey: "kubernetes.io/hostname"
        matchLabelKeys:
          - pod-template-hash
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: "topology.kubernetes.io/zone"
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: '{{ include "stardust.name" $ }}'
        app.kubernetes.io/instance: '{{ .Release.Name }}'
    matchLabelKeys:
      - pod-template-hash
env:
  HELLO: world
envFrom:
  - configMapRef:
      name: '{{ include "stardust.name" $ }}-cm'
  - secretRef:
      name: '{{ include "stardust.name" $ }}-secret'
configMaps:
  - name: '{{ include "stardust.name" $ }}-cm'
    data:
      hello: "world"
secrets:
  - name: '{{ include "stardust.name" $ }}-secret'
    stringData:
      plaintext: helloWorld